name: _PUSH_ on main

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cargo-lock-and-package-json-and-compose-yml:
    if: startsWith(github.event.pull_request.title, 'chore(main):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.["."] // .["./"]' .github/.release-please-manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Update compose.yml with new version
        run: |
          sed -i "s|image: .*:.*|image: utaaf:${{ steps.version.outputs.version }}|g" compose.yml
          cat compose.yml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        working-directory: ./rust
        run: cargo update --workspace

      - name: Update package-lock.json
        working-directory: ./typescript
        run: npm ci

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rust/Cargo.lock typescript/package-lock.json compose.yml
          git commit -m "chore: update Cargo.lock and package.json and compose.yml to V${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json