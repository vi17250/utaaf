name: _PUSH_ on main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update compose.yml with commit SHA
        run: |
          SHORT_SHA="${{ github.sha }}"
          VERSION="${SHORT_SHA:0:7}"
          echo "Commit: $VERSION"
          sed -i -E "s|image: utaaf_image:*|image: utaaf_image:$VERSION|" compose.yml

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json