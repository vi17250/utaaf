name: _PR_ and _PUSH_ on main branch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  afficher_infos:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by -> ${{ github.actor }}"
      - run: echo "🎉 ref is -> ${{ github.ref }}"
      - run: echo "🎉 refname is -> ${{ github.ref_name }}"
    

  test_typescript:
    if: ${{ github.actor }} == vi17250
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
      - name: Setup NodeJs
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  test-rust:
    if: ${{ github.actor }} == vi17250
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build 
    - name: Test
      run: cargo test --verbose
    - name: Install clippy
      run: rustup component add --toolchain nightly-2025-08-08-x86_64-unknown-linux-gnu clippy
    - name: Clippy
      run: cargo clippy -- -Dwarnings
