name: _PR_ and _PUSH_ on main branch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  display_author:
    - name: Afficher l'auteur de l'événement
      run: echo "L'acteur GitHub est : ${{ github.actor }}"
  test_typescript:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
      - name: Setup NodeJs
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  test-rust:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build 
    - name: Test
      run: cargo test --verbose
    - name: Install clippy
      run: rustup component add --toolchain nightly-2025-08-08-x86_64-unknown-linux-gnu clippy
    - name: Clippy
      run: cargo clippy -- -Dwarnings
